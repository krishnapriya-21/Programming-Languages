<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate - Paws & Claws</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>🐾 Support Paws & Claws</h1>
  </header>

  <nav>
    <a href="./index.html">Home</a>
    <a href="./index.html#pets">Available Pets</a>
    <a href="./donate.html">Donate</a>
  </nav>

  <main>
    <section>
      <h2>Make a Donation</h2>
      <p>Your support helps us provide food, shelter, and medical care for our animals.</p>
      
      <form id="donationForm">
        <label for="donorName">Name:</label>
        <input type="text" id="donorName" required>

        <label for="donorEmail">Email:</label>
        <input type="email" id="donorEmail" required>

        <label for="amount">Donation Amount:</label>
        <select id="amount" required>
          <option value="">--Select Amount--</option>
          <option value="10">$10</option>
          <option value="25">$25</option>
          <option value="50">$50</option>
          <option value="100">$100</option>
        </select>

        <button type="submit">Donate Now</button>
      </form>
      <p id="donationMessage" class="success"></p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Paws & Claws Shelter</p>
  </footer>

  <script src="./donate.js"></script>
</body>
</html>
