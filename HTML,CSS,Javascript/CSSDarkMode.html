<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual Dark Mode Toggle</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --surface: #f3f4f6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
    }

    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    /* Dark mode override */
    body.dark {
      --bg: #0d1117;
      --text: #e6edf3;
      --surface: #161b22;
    }

    .toggle-btn {
      margin: 20px auto;
      display: block;
      padding: 10px 20px;
      background: #264DE4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    .toggle-btn:hover {
      background: #1a3bc4;
    }
  </style>
</head>
<body>
  <button class="toggle-btn" onclick="document.body.classList.toggle('dark')">
    Toggle Dark Mode
  </button>

  <div class="card">
    <h2>Theme-Aware Card</h2>
    <p>This card adapts to light or dark mode. Click the button above to switch manually.</p>
  </div>
</body>
</html>
