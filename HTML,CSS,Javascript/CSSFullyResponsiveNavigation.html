<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Navbar</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #1a1a2e;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      color: white;
      font-size: 1.5rem;
      font-weight: 800;
    }
    .nav-links {
      display: none;   /* hidden on mobile */
      list-style: none;
      gap: 24px;
      margin: 0;
      padding: 0;
    }
    .nav-links li {
      display: inline;
    }
    .nav-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-weight: 500;
    }
    .nav-links a:hover {
      color: white;
    }
    .hamburger {
      display: flex;
      color: white;
      cursor: pointer;
      font-size: 1.5rem;
    }
    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
      .hamburger {
        display: none;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">MySite</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="hamburger">&#9776;</div>
  </nav>
</body>
</html>
