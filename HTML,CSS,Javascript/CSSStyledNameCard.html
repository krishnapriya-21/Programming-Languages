<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
    }
    .card {
      width: 280px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.07);
      font-family: Arial, sans-serif;
    }
    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card-body {
      padding: 16px;
    }
    .card-title {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }
    .card-price {
      margin: 0 0 16px;
      color: #e44d26;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .btn-buy {
      display: block;
      width: 100%;
      padding: 10px;
      background: #264DE4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-buy:hover {
      background: #1a3bc4;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="card-img" src="product.jpg" alt="Product">
    <div class="card-body">
      <h3 class="card-title">Wireless Headphones</h3>
      <p class="card-price">$79.99</p>
      <button class="btn-buy">Add to Cart</button>
    </div>
  </div>
</body>
</html>
