<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magazine Layout</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9fafb;
    }
    .magazine {
      display: grid;
      grid-template-columns: 2fr 1fr 200px;
      grid-template-rows: 80px 1fr 1fr;
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
    }
    .mag-header {
      grid-column: 1 / -1;
      background: #1a1a2e;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .feature {
      grid-column: 1;
      grid-row: 2 / 4;
      background: #f3f4f6;
      padding: 24px;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .secondary-1 {
      grid-column: 2;
      background: #dbeafe;
      padding: 16px;
      border-radius: 8px;
    }
    .secondary-2 {
      grid-column: 2;
      background: #d1fae5;
      padding: 16px;
      border-radius: 8px;
    }
    .sidebar {
      grid-column: 3;
      grid-row: 2 / 4;
      background: #f9f9f9;
      padding: 16px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="magazine">
    <header class="mag-header">DESIGN WEEKLY</header>
    <article class="feature">Main Feature Story</article>
    <aside class="secondary-1">Story 2</aside>
    <aside class="secondary-2">Story 3</aside>
    <aside class="sidebar">Sidebar</aside>
  </div>
</body>
</html>
